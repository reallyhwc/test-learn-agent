server:
  port: 8080

finance:
  data-dir: data

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  service:
    name: finance-backend
  exporter:
    otlp:
      endpoint: http://localhost:4318
