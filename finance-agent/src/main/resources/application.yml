server:
  port: 8081

spring:
  config:
    import: optional:file:../.env
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL}
      chat:
        options:
          model: ${LLM_MODEL}
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            finance-mcp:
              url: http://localhost:8082
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1000
        multiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
