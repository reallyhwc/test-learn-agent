server:
  port: 8081

spring:
  mvc:
    async:
      # 流式 LLM 长 tool-call 链（如多轮 list_transactions）可能 > 30s 默认上限
      # 提到 120s 让 ChatController.latch.await(120) 真正生效
      request-timeout: 120000
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL}
      chat:
        options:
          model: ${LLM_MODEL}
          # reasoning 模型对简单查询过度思考（实测 24s 中 23s 是 reasoning）。
          # low 让模型尽量短链推理，复杂问题仍能分析；如需深度推理可改 medium/high
          reasoning-effort: low
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            finance-mcp:
              url: http://localhost:8082
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1000
        multiplier: 2

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  service:
    name: finance-agent
  exporter:
    otlp:
      endpoint: http://localhost:4318
