version: '3.8'

services:
  backend:
    build:
      context: ./finance-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/accounts?userId=default"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  mcp-server:
    build:
      context: ./finance-mcp-server
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - FINANCE_BACKEND_URL=http://backend:8080
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/sse"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  agent:
    build:
      context: ./finance-agent
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - FINANCE_BACKEND_URL=http://backend:8080
      - SPRING_AI_MCP_CLIENT_SSE_CONNECTIONS_FINANCE-MCP_URL=http://mcp-server:8082
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      mcp-server:
        condition: service_healthy
    volumes:
      - agent-data:/app/data

  frontend:
    build:
      context: ./finance-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - agent
      - backend

volumes:
  backend-data:
  agent-data:
