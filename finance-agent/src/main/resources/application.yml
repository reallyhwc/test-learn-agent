server:
  port: 8081

spring:
  config:
    import: optional:file:../.env
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL}
      chat:
        options:
          model: ${LLM_MODEL}
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            finance-mcp:
              url: http://localhost:8082
