name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Backend - Build & Test
        run: cd finance-backend && ./mvnw -B verify

      - name: MCP Server - Build & Test
        run: cd finance-mcp-server && ./mvnw -B verify

      - name: Agent - Build (skip AI tests)
        run: cd finance-agent && ./mvnw -B compile

      - name: Upload Backend Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            finance-backend/target/surefire-reports/
            finance-mcp-server/target/surefire-reports/
          retention-days: 7

      - name: Dependency Security Check (Backend)
        run: |
          cd finance-backend
          ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 || echo "::warning::Dependency vulnerabilities found"

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: finance-frontend/package-lock.json

      - name: Install dependencies
        run: cd finance-frontend && npm ci

      - name: Lint
        run: cd finance-frontend && npx eslint src/ --max-warnings=0 || echo "::warning::ESLint warnings found"

      - name: Run tests with coverage
        run: cd finance-frontend && npx vitest run --coverage --reporter=verbose 2>&1 || npx vitest run --reporter=verbose

      - name: Upload Frontend Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: finance-frontend/coverage/
          retention-days: 7

      - name: Build
        run: cd finance-frontend && npm run build
