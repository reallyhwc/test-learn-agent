server:
  port: 8082

spring:
  ai:
    mcp:
      server:
        name: finance-mcp-server
        version: 1.0.0

finance:
  backend:
    url: http://localhost:8080

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  service:
    name: finance-mcp-server
  exporter:
    otlp:
      endpoint: http://localhost:4318
