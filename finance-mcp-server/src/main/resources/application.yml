server:
  port: 8082

spring:
  ai:
    mcp:
      server:
        name: finance-mcp-server
        version: 1.0.0

finance:
  backend:
    url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
